$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://corus.dev/schemas/requirement_state.schema.yaml"

title: Corus Requirement State
description: Derived satisfaction state for one requirement.
type: object
additionalProperties: false

required:
  - requirement
  - status
  - expected
  - current

properties:
  requirement:
    type: string
    pattern: "^requirement\\.[a-z0-9_\\.:-]+$"

  status:
    type: string
    enum:
      - satisfied
      - waiting

  expected:
    type: object
    additionalProperties: false
    required:
      - path
      - value
    properties:
      path:
        type: string
        pattern: "^[a-z0-9_:-]+(/[a-z0-9_:-]+)+$"
      value:
        type:
          - string
          - number
          - boolean
          - "null"

  current:
    type: object
    additionalProperties: false
    required:
      - value
    properties:
      value:
        type:
          - string
          - number
          - boolean
          - "null"
