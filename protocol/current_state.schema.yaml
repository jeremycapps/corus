$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://corus.dev/schemas/current_state.schema.yaml"

title: Corus Current State
description: Current replayed path values for a workstream, usually produced from Timpos replay.
type: object
additionalProperties: false

required:
  - workstream
  - values

properties:
  workstream:
    type: string
    pattern: "^[a-z0-9_\\.:-]+$"
    description: Workstream identifier for the replayed state.

  values:
    type: object
    description: Map of Libera path addresses to current replayed values.
    additionalProperties:
      type:
        - string
        - number
        - boolean
        - "null"
    propertyNames:
      pattern: "^[a-z0-9_:-]+(/[a-z0-9_:-]+)+$"
