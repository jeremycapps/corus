$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://corus.dev/schemas/objective.schema.yaml"

title: Corus Objective
description: A Corus objective relates requirements inside a workstream.
type: object
additionalProperties: false

required:
  - id
  - workstream
  - requires

properties:
  id:
    type: string
    pattern: "^objective\\.[a-z0-9_\\.:-]+$"
    description: Stable Corus objective identifier.

  workstream:
    type: string
    pattern: "^[a-z0-9_\\.:-]+$"
    description: Workstream identifier. Corus references the workstream as the state-space; it does not define it.

  requires:
    type: array
    minItems: 1
    uniqueItems: true
    description: Requirement ids that must all be satisfied. This is all_of.
    items:
      type: string
      pattern: "^requirement\\.[a-z0-9_\\.:-]+$"

  completion:
    type: string
    pattern: "^requirement\\.[a-z0-9_\\.:-]+$"
    description: Optional singular requirement id that proves closure. If omitted, all required requirements prove closure.
