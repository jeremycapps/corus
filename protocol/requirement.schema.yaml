$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://corus.dev/schemas/requirement.schema.yaml"

title: Corus Requirement
description: A Corus requirement defines one expected value at one Libera path.
type: object
additionalProperties: false

required:
  - id
  - path
  - value

properties:
  id:
    type: string
    pattern: "^requirement\\.[a-z0-9_\\.:-]+$"
    description: Stable Corus requirement identifier.

  path:
    type: string
    pattern: "^[a-z0-9_:-]+(/[a-z0-9_:-]+)+$"
    description: Libera path address for the expected state. Common v1 form is {type}/{id}, for example movement/task.

  value:
    type:
      - string
      - number
      - boolean
      - "null"
    description: Expected value at the Libera path.
