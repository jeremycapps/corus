$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://corus.dev/schemas/objective_state.schema.yaml"

title: Corus Objective State
description: Derived coordination status for an objective.
type: object
additionalProperties: false

required:
  - objective
  - workstream
  - status
  - requires

properties:
  objective:
    type: string
    pattern: "^objective\\.[a-z0-9_\\.:-]+$"

  workstream:
    type: string
    pattern: "^[a-z0-9_\\.:-]+$"

  status:
    type: string
    enum:
      - waiting
      - ready_for_completion
      - complete

  requires:
    type: object
    additionalProperties: false
    required:
      - satisfied
      - waiting_on
    properties:
      satisfied:
        type: array
        uniqueItems: true
        items:
          type: string
          pattern: "^requirement\\.[a-z0-9_\\.:-]+$"
      waiting_on:
        type: array
        uniqueItems: true
        items:
          type: string
          pattern: "^requirement\\.[a-z0-9_\\.:-]+$"

  completion:
    type: object
    additionalProperties: false
    properties:
      satisfied:
        type:
          - string
          - "null"
        pattern: "^requirement\\.[a-z0-9_\\.:-]+$"
      waiting_on:
        type:
          - string
          - "null"
        pattern: "^requirement\\.[a-z0-9_\\.:-]+$"

  next_requirement:
    type:
      - string
      - "null"
    pattern: "^requirement\\.[a-z0-9_\\.:-]+$"
